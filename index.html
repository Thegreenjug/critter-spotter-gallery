<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Critter Spotter Portrait Gallery</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #65717f;
      --line: #d8dee6;
      --panel: #ffffff;
      --field: #f7f9fb;
      --page: #eef2f6;
      --accent: #126b76;
      --accent-ink: #ffffff;
      --danger: #9b2f2f;
      --shadow: 0 10px 28px rgba(31, 41, 51, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      letter-spacing: 0;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 3px 14px rgba(31, 41, 51, 0.08);
    }

    .bar {
      max-width: 1440px;
      margin: 0 auto;
      padding: 14px 18px;
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    .brand {
      min-width: 0;
    }

    .filter-toggle {
      display: none;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(4, minmax(100px, 145px)) repeat(3, minmax(78px, 110px)) auto;
      gap: 10px;
      align-items: end;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 700;
    }

    .meta {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    input,
    select {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--field);
      color: var(--ink);
      font-size: 14px;
      padding: 0 10px;
    }

    input:focus,
    select:focus,
    button:focus {
      outline: 2px solid rgba(18, 107, 118, 0.35);
      outline-offset: 1px;
    }

    button {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      font-size: 14px;
      padding: 0 12px;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(158px, 1fr));
      gap: 14px;
      align-items: start;
    }

    .card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel);
      box-shadow: 0 2px 10px rgba(31, 41, 51, 0.06);
      cursor: pointer;
    }

    .card:focus {
      outline: 2px solid rgba(18, 107, 118, 0.45);
      outline-offset: 2px;
    }

    .photo {
      width: 100%;
      aspect-ratio: 45 / 55;
      display: block;
      object-fit: cover;
      background: #d7dde5;
    }

    .info {
      padding: 10px;
      display: grid;
      gap: 5px;
    }

    .name {
      min-height: 36px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .seat {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .badge {
      min-width: 24px;
      height: 22px;
      border-radius: 4px;
      display: inline-grid;
      place-items: center;
      color: #ffffff;
      font-weight: 700;
      font-size: 12px;
      flex: 0 0 auto;
    }

    .subline {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .party-D {
      background: #1f6fb2;
    }

    .party-R {
      background: #b33a35;
    }

    .party-I {
      background: #5d6470;
    }

    .empty {
      display: none;
      padding: 44px 12px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
    }

    .dialog {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 30;
      background: rgba(22, 28, 35, 0.62);
      padding: 24px;
    }

    .dialog.open {
      display: grid;
      place-items: center;
    }

    .detail {
      width: min(860px, 100%);
      max-height: calc(100vh - 48px);
      overflow: auto;
      display: grid;
      grid-template-columns: minmax(220px, 320px) minmax(0, 1fr);
      background: var(--panel);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .detail img {
      width: 100%;
      height: 100%;
      max-height: calc(100vh - 48px);
      object-fit: cover;
      background: #d7dde5;
    }

    .detail-body {
      padding: 22px;
      display: grid;
      align-content: start;
      gap: 14px;
    }

    .detail-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .facts {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 8px 12px;
      font-size: 14px;
    }

    .facts dt {
      color: var(--muted);
      font-weight: 700;
    }

    .facts dd {
      margin: 0;
      overflow-wrap: anywhere;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .actions a,
    .actions button {
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 12px;
      color: var(--ink);
      background: var(--panel);
      text-decoration: none;
      font-size: 14px;
    }

    .actions a.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-ink);
    }

    @media (max-width: 900px) {
      .bar {
        grid-template-columns: 1fr;
      }

      .filters {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 620px) {
      .bar {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        padding: 10px 12px;
      }

      h1 {
        font-size: 18px;
      }

      .meta {
        font-size: 12px;
      }

      .filter-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        grid-column: 2;
        min-width: 76px;
        font-weight: 700;
      }

      .filters {
        grid-column: 1 / -1;
        grid-template-columns: 1fr;
        max-height: 0;
        overflow: hidden;
        visibility: hidden;
        border-top: 0 solid var(--line);
        transition: max-height 180ms ease, visibility 180ms ease, border-width 180ms ease, padding-top 180ms ease;
      }

      .filters.open {
        max-height: calc(100vh - 74px);
        overflow-y: auto;
        visibility: visible;
        border-top-width: 1px;
        padding-top: 10px;
      }

      main {
        padding: 12px;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
        gap: 10px;
      }

      .detail {
        grid-template-columns: 1fr;
      }

      .detail img {
        max-height: 58vh;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div class="brand">
        <h1>Critter Spotter</h1>
        <div class="meta"><span id="count">0</span> portraits</div>
      </div>
      <button id="filter-toggle" class="filter-toggle" type="button" aria-expanded="false" aria-controls="filters">Filters</button>
      <div id="filters" class="filters">
        <div>
          <label for="search">Search</label>
          <input id="search" type="search" autocomplete="off" placeholder="Name or BioGuide ID">
        </div>
        <div>
          <label for="chamber">Chamber</label>
          <select id="chamber">
            <option value="">All</option>
            <option value="House">House</option>
            <option value="Senate">Senate</option>
          </select>
        </div>
        <div>
          <label for="state">State</label>
          <select id="state">
            <option value="">All</option>
          </select>
        </div>
        <div>
          <label for="party">Party</label>
          <select id="party">
            <option value="">All</option>
            <option value="D">D</option>
            <option value="R">R</option>
            <option value="I">I</option>
          </select>
        </div>
        <div>
          <label for="sex">Sex</label>
          <select id="sex">
            <option value="">All</option>
            <option value="F">Female</option>
            <option value="M">Male</option>
          </select>
        </div>
        <div>
          <label for="min-age">Min Age</label>
          <input id="min-age" type="number" inputmode="numeric" min="18" max="120" placeholder="Any">
        </div>
        <div>
          <label for="max-age">Max Age</label>
          <input id="max-age" type="number" inputmode="numeric" min="18" max="120" placeholder="Any">
        </div>
        <button id="reset" type="button">Reset</button>
      </div>
    </div>
  </header>

  <main>
    <section id="grid" class="grid" aria-live="polite"></section>
    <div id="empty" class="empty">No matching portraits.</div>
  </main>

  <div id="dialog" class="dialog" role="dialog" aria-modal="true" aria-labelledby="detail-title">
    <article class="detail">
      <img id="detail-photo" alt="">
      <div class="detail-body">
        <h2 id="detail-title" class="detail-title"></h2>
        <dl class="facts">
          <dt>Seat</dt>
          <dd id="detail-seat"></dd>
          <dt>Party</dt>
          <dd id="detail-party"></dd>
          <dt>Sex</dt>
          <dd id="detail-sex"></dd>
          <dt>Age</dt>
          <dd id="detail-age"></dd>
          <dt>BioGuide</dt>
          <dd id="detail-bioguide"></dd>
          <dt>Local file</dt>
          <dd id="detail-path"></dd>
        </dl>
        <div class="actions">
          <a id="detail-official" class="primary" href="#" target="_blank" rel="noreferrer">Profile</a>
          <a id="detail-source" href="#" target="_blank" rel="noreferrer">Portrait Source</a>
          <button id="close" type="button">Close</button>
        </div>
      </div>
    </article>
  </div>

  <script src="data/current_members.js"></script>
  <script>
    const state = {
      members: [],
      filtered: []
    };

    const els = {
      count: document.querySelector("#count"),
      search: document.querySelector("#search"),
      chamber: document.querySelector("#chamber"),
      state: document.querySelector("#state"),
      party: document.querySelector("#party"),
      sex: document.querySelector("#sex"),
      minAge: document.querySelector("#min-age"),
      maxAge: document.querySelector("#max-age"),
      reset: document.querySelector("#reset"),
      filterToggle: document.querySelector("#filter-toggle"),
      filters: document.querySelector("#filters"),
      grid: document.querySelector("#grid"),
      empty: document.querySelector("#empty"),
      dialog: document.querySelector("#dialog"),
      detailPhoto: document.querySelector("#detail-photo"),
      detailTitle: document.querySelector("#detail-title"),
      detailSeat: document.querySelector("#detail-seat"),
      detailParty: document.querySelector("#detail-party"),
      detailSex: document.querySelector("#detail-sex"),
      detailAge: document.querySelector("#detail-age"),
      detailBioguide: document.querySelector("#detail-bioguide"),
      detailPath: document.querySelector("#detail-path"),
      detailOfficial: document.querySelector("#detail-official"),
      detailSource: document.querySelector("#detail-source"),
      close: document.querySelector("#close")
    };

    function normalize(value) {
      return String(value || "").toLowerCase();
    }

    function partyClass(party) {
      return `badge party-${party || "I"}`;
    }

    function sexLabel(sex) {
      if (sex === "F") return "Female";
      if (sex === "M") return "Male";
      return "";
    }

    function ageLabel(member) {
      if (Number.isInteger(member.age)) return `${member.age}`;
      return "Unknown";
    }

    function numberValue(input) {
      const value = Number.parseInt(input.value, 10);
      return Number.isFinite(value) ? value : null;
    }

    function populateStates() {
      const states = [...new Set(state.members.map((member) => member.state))].sort();
      for (const code of states) {
        const option = document.createElement("option");
        option.value = code;
        option.textContent = code;
        els.state.append(option);
      }
    }

    function matches(member) {
      const q = normalize(els.search.value.trim());
      if (q) {
        const haystack = normalize(`${member.full_name} ${member.last_name} ${member.bioguide_id} ${member.seat}`);
        if (!haystack.includes(q)) return false;
      }
      if (els.chamber.value && member.chamber !== els.chamber.value) return false;
      if (els.state.value && member.state !== els.state.value) return false;
      if (els.party.value && member.party !== els.party.value) return false;
      if (els.sex.value && member.sex !== els.sex.value) return false;

      const minAge = numberValue(els.minAge);
      const maxAge = numberValue(els.maxAge);
      if (minAge !== null && (!Number.isInteger(member.age) || member.age < minAge)) return false;
      if (maxAge !== null && (!Number.isInteger(member.age) || member.age > maxAge)) return false;

      return true;
    }

    function render() {
      state.filtered = state.members.filter(matches);
      els.count.textContent = `${state.filtered.length} / ${state.members.length}`;
      els.grid.textContent = "";
      els.empty.style.display = state.filtered.length ? "none" : "block";

      const fragment = document.createDocumentFragment();
      for (const member of state.filtered) {
        const card = document.createElement("article");
        card.className = "card";
        card.tabIndex = 0;
        card.dataset.id = member.bioguide_id;
        card.innerHTML = `
          <img class="photo" src="${member.portrait_path}" alt="${member.full_name}" loading="lazy">
          <div class="info">
            <div class="name">${member.full_name}</div>
            <div class="seat">
              <span>${member.chamber} ${member.seat}</span>
              <span class="${partyClass(member.party)}">${member.party || ""}</span>
            </div>
            <div class="subline">Age ${ageLabel(member)}${member.sex ? ` · ${member.sex}` : ""}</div>
          </div>
        `;
        card.addEventListener("click", () => openDetail(member));
        card.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            openDetail(member);
          }
        });
        fragment.append(card);
      }
      els.grid.append(fragment);
    }

    function openDetail(member) {
      els.detailPhoto.src = member.portrait_path;
      els.detailPhoto.alt = member.full_name;
      els.detailTitle.textContent = member.full_name;
      els.detailSeat.textContent = `${member.chamber} ${member.seat}`;
      els.detailParty.textContent = member.party || "";
      els.detailSex.textContent = sexLabel(member.sex);
      els.detailAge.textContent = Number.isInteger(member.age)
        ? `${member.age} as of ${state.ageAsOf || "export"}`
        : "Unknown";
      els.detailBioguide.textContent = member.bioguide_id;
      els.detailPath.textContent = member.portrait_path;
      els.detailOfficial.href = member.official_url || "#";
      els.detailSource.href = member.portrait_url || "#";
      els.dialog.classList.add("open");
    }

    function closeDetail() {
      els.dialog.classList.remove("open");
      els.detailPhoto.removeAttribute("src");
    }

    function resetFilters() {
      els.search.value = "";
      els.chamber.value = "";
      els.state.value = "";
      els.party.value = "";
      els.sex.value = "";
      els.minAge.value = "";
      els.maxAge.value = "";
      render();
    }

    function toggleFilters() {
      const open = !els.filters.classList.contains("open");
      els.filters.classList.toggle("open", open);
      els.filterToggle.setAttribute("aria-expanded", open ? "true" : "false");
      els.filterToggle.textContent = open ? "Close" : "Filters";
    }

    async function init() {
      let payload = window.CRITTER_SPOTTER_DATA;
      if (!payload) {
        const response = await fetch("data/current_members.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Unable to load data/current_members.json: ${response.status}`);
        }
        payload = await response.json();
      }
      state.members = payload.members || [];
      state.ageAsOf = payload.age_as_of || "";
      populateStates();
      render();
    }

    for (const control of [els.search, els.chamber, els.state, els.party, els.sex, els.minAge, els.maxAge]) {
      control.addEventListener("input", render);
      control.addEventListener("change", render);
    }
    els.reset.addEventListener("click", resetFilters);
    els.filterToggle.addEventListener("click", toggleFilters);
    els.close.addEventListener("click", closeDetail);
    els.dialog.addEventListener("click", (event) => {
      if (event.target === els.dialog) closeDetail();
    });
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeDetail();
      if (event.key === "Escape" && els.filters.classList.contains("open")) toggleFilters();
    });

    init().catch((error) => {
      els.count.textContent = "0";
      els.empty.textContent = error.message;
      els.empty.style.display = "block";
      console.error(error);
    });
  </script>
</body>
</html>
